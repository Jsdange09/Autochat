# docker/prometheus.yml
# Prometheus config — scrapes your friend's /metrics endpoint
# which exposes: confidence_score, update_trigger_flag, total_requests_total, etc.

global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "aegis-backend"
    static_configs:
      - targets: ["backend:8000"]   # Docker network name
    metrics_path: /metrics

  - job_name: "prefect"
    static_configs:
      - targets: ["prefect:4200"]